<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Babaika — Архив носимых ландшафтов</title>
<script>
  // Store the RU language preference and redirect to the single index
  localStorage.setItem('babaika_lang', 'ru');
  window.location.replace('index.html');
</script>
</head>
<body>
  <!-- ── Global Video Lazy-Loader ──────────────────────────── -->
  <script>
  (function() {
    var isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

    // For every video with a src: move src → data-src, set preload=none
    // Hero videos (inside .hero-video-top, .landscape-full) are also lazy-loaded
    // but with a larger rootMargin so they start loading just before entering view.
    document.querySelectorAll('video[src]').forEach(function(v) {
      // Skip lightbox video (it has no real src yet)
      if (v.id === 'lightbox-video') return;
      v.dataset.src = v.getAttribute('src');
      v.removeAttribute('src');
      v.setAttribute('preload', 'none');
    });

    var heroObs = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (!entry.isIntersecting) return;
        var v = entry.target;
        if (v.dataset.src && !v.src) {
          v.src = v.dataset.src;
          v.load();
          v.play().catch(function(){});
        }
        heroObs.unobserve(v);
      });
    }, { rootMargin: '400px' }); // start loading 400px before entering view

    var galleryObs = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (!entry.isIntersecting) return;
        var v = entry.target;
        if (v.dataset.src && !v.src) {
          v.src = v.dataset.src;
          v.load();
          // On mobile, only play gallery videos if not data-saver mode
          if (!isMobile || !navigator.connection || navigator.connection.saveData === false) {
            v.play().catch(function(){});
          }
        }
        galleryObs.unobserve(v);
      });
    }, { rootMargin: '150px' });

    document.querySelectorAll('video[data-src]').forEach(function(v) {
      var inHero = v.closest('.hero-video-top, .hero-video-grid, .landscape-full, .chapter-hero-new');
      if (inHero) {
        heroObs.observe(v);
      } else {
        galleryObs.observe(v);
      }
    });
  })();
  </script>

</body>
</html>
